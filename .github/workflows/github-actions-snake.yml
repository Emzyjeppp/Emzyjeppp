name: Generate Animations

on:
  schedule:
    # Run automatically every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:
  # Run on every push on the main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Generates a pacman game SVG in dist/ using CLI (robust, no token required!)
      - name: Generate Pacman Contribution Graph
        run: |
          mkdir -p dist
          npx pacman-contribution-graph --platform github --username ${{ github.repository_owner }} --game pacman --gameTheme github --output dist/pacman-contribution-graph.svg
          npx pacman-contribution-graph --platform github --username ${{ github.repository_owner }} --game pacman --gameTheme github-dark --output dist/pacman-contribution-graph-dark.svg

      # Generate trophy card in dist/
      - name: Generate Trophy Card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: "username=${{ github.repository_owner }}&theme=dracula&no-bg=true&no-frame=true&column=-1&row=1"
          path: dist/trophy.svg
          token: ${{ secrets.PACMAN_TOKEN || secrets.GITHUB_TOKEN }}

      # Push the content of dist/ to target_branch output
      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
