name: Generate Animations

on:
  schedule:
    # Run automatically every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:
  # Run on every push on the main branch
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Generates a pacman game SVG in dist/
      - name: Generate Pacman Contribution Graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.PACMAN_TOKEN || secrets.GITHUB_TOKEN }}
          games: 'pacman'
        env:
          GITHUB_TOKEN: ${{ secrets.PACMAN_TOKEN || secrets.GITHUB_TOKEN }}

      # Generate trophy card in dist/
      - name: Generate Trophy Card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: "username=${{ github.repository_owner }}&theme=dracula&no-bg=true&no-frame=true&column=-1&row=1"
          path: dist/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Push the content of dist/ to target_branch output
      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
